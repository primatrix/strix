apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  labels:
    app: strix-benchmark
    branch: ${BRANCH_LABEL}
spec:
  backoffLimit: 0
  template:
    metadata:
      annotations:
        cloud.google.com/gke-tpu-topology: ${TPU_TOPOLOGY}
    spec:
      serviceAccountName: gcs-account
      restartPolicy: Never
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: ${TPU_ACCELERATOR}
        cloud.google.com/gke-tpu-topology: ${TPU_TOPOLOGY}
      containers:
        - name: benchmark
          image: python:3.12-slim
          command:
            - bash
            - -c
            - |
              apt-get update -qq && apt-get install -y -qq git > /dev/null && \
              git clone --depth 1 -b ${BRANCH} https://github.com/primatrix/strix.git /workspace && \
              cd /workspace && \
              pip install uv && \
              uv sync --extra tpu && \
              uv run ${RUNNER_CMD}
          env:
            - name: KERNEL_MODULE
              value: "${KERNEL_MODULE}"
            - name: SHAPE
              value: "${SHAPE}"
            - name: CHUNK_SIZE
              value: "${CHUNK_SIZE}"
            - name: EP_SIZE
              value: "${EP_SIZE}"
            - name: BRANCH
              value: "${BRANCH}"
            - name: JOB_NAME
              value: "${JOB_NAME}"
            - name: GCS_BUCKET
              value: "${GCS_BUCKET}"
            - name: SWEEP
              value: "${SWEEP}"
            - name: TOTAL_BYTES
              value: "${TOTAL_BYTES}"
            - name: NO_IR_DUMP
              value: "${NO_IR_DUMP}"
          resources:
            limits:
              google.com/tpu: ${TPU_CHIPS}
