<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 820" font-family="Inter, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#475569"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#dc2626"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#16a34a"/></marker>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f97316"/></marker>
  </defs>

  <rect width="960" height="820" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="480" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#c2410c">expController 流程图</text>

  <!-- Step 1: ListJobs -->
  <rect x="265" y="50" width="430" height="45" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="480" y="70" text-anchor="middle" font-weight="600" fill="#5b21b6">ListJobs(CommonListReq)</text>
  <text x="480" y="85" text-anchor="middle" font-size="10" fill="#7c3aed">filter: JobStatus != Succeeded / Failed / Aborted</text>

  <line x1="480" y1="95" x2="480" y2="118" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2: ListArtifacts -->
  <rect x="265" y="123" width="430" height="45" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="480" y="143" text-anchor="middle" font-weight="600" fill="#5b21b6">ListArtifacts(CommonListReq)</text>
  <text x="480" y="158" text-anchor="middle" font-size="10" fill="#7c3aed">filter: filteredArtifacts</text>

  <line x1="480" y1="168" x2="480" y2="193" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- forEach -->
  <rect x="345" y="198" width="270" height="35" rx="15" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="480" y="220" text-anchor="middle" font-weight="600" fill="#1e40af">forEach Job in filteredJob</text>

  <line x1="480" y1="233" x2="480" y2="258" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Diamond: JobStatus -->
  <polygon points="480,263 615,303 480,343 345,303" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="307" text-anchor="middle" font-weight="600" fill="#92400e">JobStatus?</text>

  <!-- ======== Branch 1: Succeeded ======== -->
  <line x1="345" y1="303" x2="105" y2="303" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="105" y1="303" x2="105" y2="378" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="220" y="295" font-size="11" fill="#16a34a" font-weight="600">Succeeded</text>

  <rect x="15" y="383" width="180" height="50" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="105" y="403" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">artifactPhase = Succeeded</text>
  <text x="105" y="420" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">expPhase = Succeeded</text>

  <!-- ======== Branch 2: Failed ======== -->
  <line x1="345" y1="303" x2="325" y2="378" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="305" y="345" font-size="11" fill="#dc2626" font-weight="600">Failed</text>

  <rect x="220" y="383" width="210" height="50" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="325" y="403" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">artifactPhase = Failed + Reason</text>
  <text x="325" y="420" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">expPhase = Failed + Reason</text>

  <!-- ======== Branch 3: Aborted ======== -->
  <line x1="615" y1="303" x2="585" y2="378" stroke="#f97316" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="625" y="345" font-size="11" fill="#f97316" font-weight="600">Aborted</text>

  <rect x="455" y="383" width="260" height="65" rx="6" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="585" y="401" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">artifact: Failed + reason + message</text>
  <text x="585" y="418" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">exp: Aborted + aborted_at</text>
  <text x="585" y="435" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">    + reason + message</text>

  <!-- ======== Branch 4: Pending/Running ======== -->
  <line x1="615" y1="303" x2="840" y2="303" stroke="#475569" stroke-width="1.5"/>
  <line x1="840" y1="303" x2="840" y2="378" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="730" y="295" font-size="11" fill="#475569" font-weight="600">Pending/Running</text>

  <rect x="740" y="383" width="200" height="50" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="840" y="403" text-anchor="middle" font-size="10" font-weight="600" fill="#075985">expStatus =</text>
  <text x="840" y="420" text-anchor="middle" font-size="10" fill="#0369a1">jobStatus2expStatus(job)</text>

  <!-- ======== Convergence: Branches 1-3 → UpdateArtifactStatus ======== -->
  <line x1="105" y1="433" x2="105" y2="468" stroke="#475569" stroke-width="1.5"/>
  <line x1="325" y1="433" x2="325" y2="468" stroke="#475569" stroke-width="1.5"/>
  <line x1="585" y1="448" x2="585" y2="468" stroke="#475569" stroke-width="1.5"/>
  <line x1="105" y1="468" x2="585" y2="468" stroke="#475569" stroke-width="1.5"/>
  <line x1="400" y1="468" x2="400" y2="493" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="265" y="498" width="270" height="40" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="400" y="523" text-anchor="middle" font-weight="600" fill="#5b21b6">UpdateArtifactStatus(Req)</text>

  <!-- UpdateArtifactStatus → UpdateExpStatus -->
  <line x1="400" y1="538" x2="400" y2="568" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Branch 4 → UpdateExpStatus (bypass UpdateArtifactStatus) -->
  <line x1="840" y1="433" x2="840" y2="588" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="840" y1="588" x2="535" y2="588" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a)"/>

  <rect x="265" y="573" width="270" height="40" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="400" y="598" text-anchor="middle" font-weight="600" fill="#5b21b6">UpdateExpStatus(Req)</text>

  <!-- ======== Result Check ======== -->
  <line x1="400" y1="613" x2="400" y2="638" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="400,643 490,678 400,713 310,678" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="682" text-anchor="middle" font-weight="600" fill="#92400e">成功?</text>

  <!-- Yes → next -->
  <line x1="490" y1="678" x2="560" y2="678" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="525" y="670" font-size="11" fill="#16a34a" font-weight="600">Yes</text>
  <rect x="565" y="661" width="80" height="35" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="605" y="683" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">next</text>

  <!-- No → 打印日志 -->
  <line x1="400" y1="713" x2="400" y2="738" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="415" y="729" font-size="11" fill="#dc2626" font-weight="600">No</text>

  <rect x="300" y="743" width="200" height="50" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="400" y="763" text-anchor="middle" font-weight="600" fill="#991b1b">打印日志</text>
  <text x="400" y="781" text-anchor="middle" font-size="10" fill="#b91c1c">关联 expName, expID, jobID</text>

  <!-- Log → next (loop) -->
  <line x1="500" y1="768" x2="605" y2="701" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="565" y="741" font-size="10" fill="#475569">next</text>
</svg>
