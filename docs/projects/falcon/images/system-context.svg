<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Inter, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#475569"/></marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/></marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="560" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- Title -->
  <text x="480" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">System Context Diagram</text>

  <!-- CLI -->
  <rect x="40" y="80" width="120" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="110" text-anchor="middle" font-weight="600" fill="#1e40af">CLI</text>

  <!-- FalconAPIServer -->
  <rect x="280" y="65" width="300" height="80" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="430" y="93" text-anchor="middle" font-weight="700" fill="#5b21b6">FalconAPIServer</text>
  <text x="430" y="113" text-anchor="middle" font-size="10" fill="#7c3aed">gRPC Server + HTTP Gateway</text>
  <text x="430" y="128" text-anchor="middle" font-size="10" fill="#7c3aed">Cloudflare Access 认证</text>

  <!-- MySQL -->
  <rect x="720" y="80" width="120" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="780" y="110" text-anchor="middle" font-weight="600" fill="#92400e">MySQL DB</text>

  <!-- CLI -> APIServer -->
  <line x1="160" y1="105" x2="275" y2="105" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="218" y="97" text-anchor="middle" font-size="11" fill="#3b82f6" font-weight="500">HTTP</text>

  <!-- APIServer <-> MySQL -->
  <line x1="580" y1="100" x2="715" y2="100" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="715" y1="115" x2="580" y2="115" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="648" y="93" text-anchor="middle" font-size="11" fill="#475569">Read/Write</text>

  <!-- ResourceManager Controller -->
  <rect x="40" y="220" width="250" height="70" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="165" y="245" text-anchor="middle" font-weight="600" fill="#166534">ResourceManager Controller</text>
  <text x="165" y="265" text-anchor="middle" font-size="10" fill="#166534">Job 创建/终止 + K8s 状态回写</text>

  <!-- FalconController box -->
  <rect x="320" y="220" width="380" height="130" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="510" y="245" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">FalconController</text>

  <!-- expController -->
  <rect x="350" y="265" width="320" height="55" rx="6" fill="#ffedd5" stroke="#f97316" stroke-width="1.5"/>
  <text x="510" y="290" text-anchor="middle" font-weight="600" fill="#c2410c">expController</text>
  <text x="510" y="306" text-anchor="middle" font-size="10" fill="#ea580c">基于 Job status，更新 Exp 和 Artifact</text>

  <!-- AnalyzerController -->
  <rect x="720" y="220" width="200" height="70" rx="6" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="820" y="245" text-anchor="middle" font-weight="600" fill="#115e59">AnalyzerController</text>
  <text x="820" y="265" text-anchor="middle" font-size="10" fill="#115e59">Profile/Metrics 分析</text>

  <!-- K8s Cluster -->
  <rect x="60" y="430" width="210" height="60" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="165" y="455" text-anchor="middle" font-weight="600" fill="#075985">K8s Cluster</text>
  <text x="165" y="473" text-anchor="middle" font-size="11" fill="#0369a1">K8s Jobs</text>

  <!-- ResourceManager -> K8s -->
  <line x1="165" y1="290" x2="165" y2="425" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="180" y="355" font-size="10" fill="#22c55e" font-weight="500">watch / create</text>
  <text x="180" y="370" font-size="10" fill="#22c55e" font-weight="500">/ delete</text>

  <!-- ResourceManager -> APIServer (gRPC) -->
  <line x1="290" y1="235" x2="350" y2="145" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <text x="305" y="195" font-size="10" fill="#7c3aed" transform="rotate(-55, 305, 195)">gRPC</text>

  <!-- expController -> APIServer -->
  <line x1="510" y1="265" x2="430" y2="145" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <text x="475" y="200" font-size="10" fill="#7c3aed">gRPC</text>

  <!-- AnalyzerController -> APIServer (gRPC) -->
  <line x1="820" y1="220" x2="530" y2="145" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <text x="685" y="175" font-size="10" fill="#7c3aed">gRPC</text>

  <!-- Status propagation legend -->
  <rect x="460" y="400" width="380" height="100" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="650" y="422" text-anchor="middle" font-weight="600" font-size="12" fill="#334155">状态传播链</text>
  <text x="485" y="445" font-size="12" fill="#475569">K8s Job Status → Job Status ──┐</text>
  <text x="485" y="468" font-size="12" fill="#475569">                               ├──► Exp Status</text>
  <text x="485" y="488" font-size="12" fill="#475569">                Artifact Status ┘</text>
</svg>
