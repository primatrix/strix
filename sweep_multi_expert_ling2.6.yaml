# Multi-expert pipeline sweep — Ling 2.6 1T decode profile
# ========================================================
# Stage:  Decode (autoregressive, B=1 per routed expert)
# Model:  Ling-2.6-1T EP decode (d=8192, f=2048, bf16)
# Kernel: multi_expert_pipeline (sequential N-expert double-buffer FFN)
#
# Sweeps num_experts in [1, 4, 8, 16, 32, 64, 256] using device-level
# timing (JAX profiler trace) to measure actual TPU durations.
#
# Shape encoding (metadata): num_tokens,hidden_size,intermediate_size
#
# Run:
#   bash scripts/run_benchmark.sh kernels.multi_expert_pipeline \
#     --shape "256,8192,2048" --no-ir-dump \
#     --runner-script scripts/sweep_multi_expert_device.py

kernel: kernels.multi_expert_pipeline
shape: "256,8192,2048"
tpu_type: v7x
tpu_topology: 2x2x1
no_ir_dump: true
runner_script: scripts/sweep_multi_expert_device.py
